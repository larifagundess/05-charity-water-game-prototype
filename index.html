<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bottle Sort Game</title>

  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>

<body>

<!-- START SCREEN -->
<div id="startScreen" class="screen active">
  <img src="img/cw_logo_horizontal.png" class="logo-img">
  <h1>Bottle Sort</h1>
  <p class="subtitle">Clean vs Contaminated</p>

  <button id="startBtn" class="primary">PLAY</button>
</div>

<!-- GAME SCREEN -->
<div id="gameScreen" class="screen">

  <div class="hud">
    <div>Score: <span id="score">0</span></div>
    <div>Time: <span id="time">30</span>s</div>
    <div>Lives: <span id="lives">3</span></div>
  </div>

  <div class="timer-bar">
    <div id="timerFill"></div>
  </div>

  <div class="game-area">

    <div class="left">
      <div id="card" class="card">
        <p id="itemText">Dorm Fountain</p>
      </div>

      <p id="feedback"></p>

      <button id="cleanBtn" class="primary">CLEAN</button>
      <button id="badBtn">CONTAMINATED</button>

      <button id="resetBtn">RESET</button>
    </div>

    <div class="right">
      <h3>Did You Know?</h3>
      <p>1 in 10 people lack access to clean water.</p>
      <a href="https://www.charitywater.org" target="_blank" class="primary">Learn More</a>
    </div>

  </div>
</div>

<!-- END SCREEN -->
<div id="endScreen" class="screen">
  <h1>Round Complete 🎉</h1>
  <p>Final Score: <strong id="finalScore">0</strong></p>

  <button id="restartBtn">Play Again</button>
  <a href="https://www.charitywater.org" target="_blank" class="primary">Learn More</a>
</div>

<!-- SOUNDS -->
<audio id="clickSound" src="click.mp3"></audio>
<audio id="winSound" src="win.mp3"></audio>

<script src="script.js"></script>
</body>
</html>
